<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>配信記録</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --surface: #16161f;
  --surface2: #1d1d28;
  --surface3: #242432;
  --border: #252535;
  --border2: #32324a;
  --accent: #6c63ff;
  --accent2: #8b85ff;
  --teal: #00d4aa;
  --teal2: #00f5c4;
  --amber: #f5a623;
  --amber2: #ffc15e;
  --rose: #ff6b9d;
  --green: #2ecc71;
  --text: #e8e8f0;
  --text2: #8888aa;
  --text3: #44445a;
  --owner-accent: #ff6b9d;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  overscroll-behavior: none;
}

/* ══════════════ LOGIN SCREEN ══════════════ */
.login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.login-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
  top: -200px; right: -200px;
  pointer-events: none;
}
.login-screen::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  pointer-events: none;
}

.app-logo {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 48px;
}
.app-logo span { color: var(--accent2); }

.mode-cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  margin-bottom: 32px;
}

.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-align: left;
}
.mode-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
}
.mode-card.cast::before { background: linear-gradient(135deg, rgba(108,99,255,0.08), transparent); }
.mode-card.owner::before { background: linear-gradient(135deg, rgba(255,107,157,0.08), transparent); }
.mode-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.mode-card:hover::before { opacity: 1; }
.mode-card:active { transform: translateY(0); }

.mode-icon { font-size: 28px; margin-bottom: 10px; display: block; }
.mode-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.mode-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.mode-card.cast .mode-title { color: var(--accent2); }
.mode-card.owner .mode-title { color: var(--owner-accent); }
.mode-arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 18px; }

/* ══════════════ CAST NAME INPUT ══════════════ */
.name-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.name-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
}
.name-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.name-card p { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }

/* ══════════════ OWNER PASSWORD ══════════════ */
.pw-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.pw-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
  border-top: 2px solid var(--owner-accent);
}
.pw-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--owner-accent); }
.pw-card p { font-size: 12px; color: var(--text2); margin-bottom: 24px; }
.pw-error { color: var(--rose); font-size: 12px; margin-top: 8px; display: none; }
.pw-error.show { display: block; }

/* ══════════════ SHARED COMPONENTS ══════════════ */
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-group label { font-size: 11px; color: var(--text2); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }

.input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.input:focus { border-color: var(--accent); }
.input.owner-focus:focus { border-color: var(--owner-accent); }
select.input { cursor: pointer; }

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { background: var(--accent2); }
.btn-owner { background: var(--owner-accent); color: white; }
.btn-owner:hover { opacity: 0.9; }
.btn-teal { background: var(--teal); color: var(--bg); }
.btn-teal:hover { background: var(--teal2); }
.btn-sm {
  width: auto;
  padding: 8px 16px;
  font-size: 13px;
  border-radius: 8px;
}
.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  padding: 0;
  margin-bottom: 24px;
  font-family: 'Noto Sans JP', sans-serif;
}
.back-btn:hover { color: var(--text); }

/* ══════════════ CAST APP ══════════════ */
.cast-app { display: none; }
.cast-app.active { display: block; }

.cast-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.cast-header-name {
  font-weight: 700;
  font-size: 15px;
}
.cast-header-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  background: rgba(108,99,255,0.15);
  color: var(--accent2);
  padding: 3px 8px;
  border-radius: 4px;
}
.cast-header-month {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--teal);
}

.cast-main { padding: 14px 16px 100px; max-width: 520px; margin: 0 auto; }

/* 月ナビ */
.month-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
}
.mnav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  padding: 5px 12px;
  font-size: 16px;
  transition: all 0.12s;
  line-height: 1;
}
.mnav-btn:hover { border-color: var(--accent); color: var(--accent2); }
.mnav-label {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  text-align: center;
}

/* 月サマリー */
.mini-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.mini-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.mini-stat-label { font-size: 9px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.mini-stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; line-height: 1; }

/* 日付カード */
.legend {
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
  font-size: 11px;
  color: var(--text3);
}
.legend-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

.day-cards { display: flex; flex-direction: column; gap: 6px; }

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.day-card.filled { border-color: var(--border2); }

.day-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.day-date {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  min-width: 44px;
}
.day-card.filled .day-date { color: var(--text); }
.shime-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.pip-first { background: var(--amber); }
.pip-second { background: var(--teal); }

.day-preview {
  flex: 1;
  font-size: 12px;
  color: var(--text3);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.preview-chip {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}
.chip-coin { background: rgba(245,166,35,0.12); color: var(--amber2); }
.chip-stream { background: rgba(108,99,255,0.12); color: var(--accent2); }
.chip-fav { background: rgba(46,204,113,0.12); color: var(--green); }

.chevron { color: var(--text3); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.chevron.open { transform: rotate(180deg); }

.day-card-body {
  display: none;
  padding: 0 14px 12px;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.day-card-body.open {
  display: grid;
}

.field-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.04em; }
.field-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  text-align: right;
  padding: 9px 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.12s;
  -webkit-appearance: none;
}
.field-input:focus { border-color: var(--accent); }
.field-input.f-coin { color: var(--amber); }
.field-input.f-stream { color: var(--accent2); }
.field-input.f-fav { color: var(--green); }
.field-input.f-memo {
  color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 400;
  text-align: left;
  grid-column: 1 / -1;
}

/* save indicator */
.save-flash {
  position: fixed;
  top: 70px;
  right: 16px;
  background: var(--surface2);
  border: 1px solid var(--green);
  color: var(--green);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 6px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  z-index: 200;
  font-family: 'DM Mono', monospace;
}
.save-flash.show { opacity: 1; }

/* footer */
.cast-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  z-index: 50;
}

/* ══════════════ OWNER APP ══════════════ */
.owner-app { display: none; }
.owner-app.active { display: block; }

.owner-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 50;
  border-top: 2px solid var(--owner-accent);
}
.owner-header-logo {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--owner-accent);
  letter-spacing: 0.08em;
}
.owner-nav { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
.onav-btn {
  padding: 5px 14px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  white-space: nowrap;
  transition: all 0.12s;
}
.onav-btn:hover { background: var(--surface2); color: var(--text); }
.onav-btn.active { background: var(--surface2); color: var(--owner-accent); font-weight: 700; }

.owner-main { padding: 20px; max-width: 1100px; margin: 0 auto; }
.owner-page { display: none; }
.owner-page.active { display: block; }

/* owner cards */
.o-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.o-card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.o-card-title::before {
  content: '';
  width: 3px; height: 13px;
  background: var(--owner-accent);
  border-radius: 2px;
}

.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
@media (max-width: 600px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-box-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.stat-box-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; line-height: 1; }

/* table */
.t-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th {
  background: var(--bg2);
  color: var(--text2);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 9px 14px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th:first-child { text-align: left; }
td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  text-align: right;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}
td:first-child { text-align: left; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.tr-total td { background: var(--bg2); font-weight: 700; border-top: 1px solid var(--border2); font-size: 13px; }

/* cast mgmt grid */
.cast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 16px; }
.cast-tile {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  position: relative;
}
.cast-tile-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.cast-tile-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--teal); }
.cast-tile-del {
  position: absolute; top: 8px; right: 10px;
  background: none; border: none;
  color: var(--text3); cursor: pointer; font-size: 14px; padding: 3px 7px;
  border-radius: 4px; transition: all 0.12s;
}
.cast-tile-del:hover { background: rgba(255,107,157,0.12); color: var(--rose); }

/* bar chart */
.bar-chart { display: flex; gap: 4px; align-items: flex-end; height: 100px; padding: 4px 0; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar-val { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); }
.bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
.bar-label { font-size: 9px; color: var(--text2); font-family: 'DM Mono', monospace; }

/* modal */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 300;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-actions .btn { flex: 1; padding: 10px; }

/* toast */
#toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(30px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 12px;
  color: var(--green);
  opacity: 0;
  transition: all 0.2s;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* hidden */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ══════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════ -->
<div id="loading-overlay" style="display:none; position:fixed; inset:0; background:rgba(10,10,15,0.92); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
  <div style="width:36px; height:36px; border:3px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
  <div id="loading-msg" style="font-size:13px; color:var(--text2); font-family:'DM Mono',monospace;">読み込み中...</div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div id="login-screen" class="login-screen">
  <div class="app-logo">STUDIO <span>·</span> MGR</div>
  <div class="mode-cards">
    <div class="mode-card owner" onclick="directOwnerLogin()">
      <span class="mode-icon">📊</span>
      <div class="mode-title">オーナー管理</div>
      <span class="mode-arrow">›</span>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     CAST NAME INPUT
══════════════════════════════════ -->
<div id="cast-name-screen" class="name-screen hidden">
  <div class="name-card">
    <button class="back-btn" onclick="goLogin()">← 戻る</button>
    <h2>🎬 配信記録ログイン</h2>
    <p>オーナーから受け取ったパスワードを入力してください</p>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" class="input" id="cast-pw-input" placeholder="••••••••" oninput="clearCastPwError()">
    </div>
    <div class="pw-error" id="cast-pw-error"></div>
    <button class="btn btn-accent" onclick="startCastApp()" style="margin-top:12px;">ログイン →</button>
  </div>
</div>

<!-- ══════════════════════════════════
     OWNER PASSWORD
══════════════════════════════════ -->
<div id="owner-pw-screen" class="pw-screen hidden">
  <div class="pw-card">
    <button class="back-btn" onclick="goLogin()">← 戻る</button>
    <h2>🔐 オーナー認証</h2>
    <p>パスワードを入力してください</p>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" class="input owner-focus" id="owner-pw-input" placeholder="••••••••"
        oninput="clearPwError()">
    </div>
    <div class="pw-error" id="pw-error"></div>
    <label style="display:flex; align-items:center; gap:8px; margin-top:10px; cursor:pointer; font-size:13px; color:var(--text2);">
      <input type="checkbox" id="autologin-check" style="width:15px; height:15px; accent-color:var(--owner-accent);">
      このブラウザでログイン状態を保持する
    </label>
    <button class="btn btn-owner" onclick="checkOwnerPw()" style="margin-top:14px;">ログイン</button>

<script>
// ═══════════════════════════════════════
// GAS API
// ═══════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxoPxD_dTYysCyJBJ5fk8F4x8eyCt1ispvMxeUHKNz8ISvjG6EOkJWn1AD_U-2mVWnPPQ/exec';

async function gasGet(action, params={}) {
  const url = GAS_URL + '?action=' + action + '&' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

// GASはCORS制限のためPOSTが使えない→GETで代替（dataをJSONエンコードして渡す）
async function gasPost(action, body) {
  const params = new URLSearchParams({ action, data: JSON.stringify(body) });
  const url = GAS_URL + '?' + params.toString();
  const res = await fetch(url);
  return res.json();
}

// ローディング表示
function showLoading(msg='読み込み中...') {
  document.getElementById('loading-overlay').style.display='flex';
  document.getElementById('loading-msg').textContent=msg;
}
function hideLoading() {
  document.getElementById('loading-overlay').style.display='none';
}

// ═══════════════════════════════════════
// DATA STORE
// ═══════════════════════════════════════
const COIN_RATE = 0.05;
const MONTH_DAYS = {1:31,2:28,3:31,4:30,5:31,6:30,7:31,8:31,9:30,10:31,11:30,12:31};

let ownerPassword = 'owner1234';
let loginFailCount = 0;
let lockUntil = 0; // timestamp

function getLockRemainingMin() {
  const rem = lockUntil - Date.now();
  return rem > 0 ? Math.ceil(rem / 60000) : 0;
}

function clearPwError() {
  if (getLockRemainingMin() === 0) {
    document.getElementById('pw-error').classList.remove('show');
    document.getElementById('pw-error').textContent = '';
  }
}

// メインストア（GASから読み込み）
let store = {
  casts: [],
  records: {},
  castPasswords: {} // castId -> password
};

// GASデータをstoreに変換してロード
async function loadFromGAS() {
  showLoading('データを読み込んでいます...');
  try {
    const data = await gasGet('getAllData');
    if (data.error) throw new Error(data.error);

    // キャスト
    store.casts = data.casts || [];

    // 売上記録
    store.records = {};
    store.casts.forEach(c => { store.records[c.id] = {}; });
    (data.records || []).forEach(r => {
      const id = r.castId, m = parseInt(r.month), d = parseInt(r.day);
      if (!store.records[id]) store.records[id] = {};
      if (!store.records[id][m]) store.records[id][m] = { rewardRate: parseFloat(r.rewardRate)||0.5, fx1: parseFloat(r.fx1)||150, fx2: parseFloat(r.fx2)||150, days:{}, extra:{} };
      const md = store.records[id][m];
      md.rewardRate = parseFloat(r.rewardRate)||0.5;
      md.fx1 = parseFloat(r.fx1)||150;
      md.fx2 = parseFloat(r.fx2)||150;
      if (parseInt(r.coins) > 0) md.days[d] = parseInt(r.coins);
    });

    // 配信記録（キャスト入力）
    (data.extra || []).forEach(r => {
      const id = r.castId, m = parseInt(r.month), d = parseInt(r.day);
      if (!store.records[id]) store.records[id] = {};
      if (!store.records[id][m]) store.records[id][m] = { rewardRate:0.5, fx1:150, fx2:150, days:{}, extra:{} };
      if (!store.records[id][m].extra) store.records[id][m].extra = {};
      store.records[id][m].extra[d] = {
        streams: parseInt(r.streams)||0,
        favTotal: parseInt(r.favTotal)||0,
        memo: r.memo||''
      };
    });

    // パスワード
    if (data.settings) {
      if (data.settings.ownerPassword) ownerPassword = data.settings.ownerPassword;
      // キャストパスワード
      Object.keys(data.settings).forEach(k => {
        if (k.startsWith('castPw_')) {
          const castId = k.replace('castPw_', '');
          store.castPasswords[castId] = data.settings[k];
        }
      });
    }

    hideLoading();
    return true;
  } catch(e) {
    hideLoading();
    console.error('GAS読み込みエラー:', e);
    return false;
  }
}

// ─ ユーティリティ ─
function getMonthData(castId, month) {
  if (!store.records[castId]) store.records[castId] = {};
  if (!store.records[castId][month]) store.records[castId][month] = { rewardRate:0.5, fx1:150, fx2:150, days:{}, extra:{} };
  if (!store.records[castId][month].extra) store.records[castId][month].extra = {};
  return store.records[castId][month];
}

function calcDay(coins, isFirst, md) {
  if (!coins || coins <= 0) return null;
  const fx = isFirst ? (md.fx1||150) : (md.fx2||150);
  const jpy = coins * COIN_RATE * fx;
  return { jpy, reward: jpy * md.rewardRate, studio: jpy * (1 - md.rewardRate) };
}

function calcMonth(castId, month) {
  const md = getMonthData(castId, month);
  let coins=0, jpy=0, reward=0, studio=0, streams=0, favs=0;
  let fCoins=0, fReward=0, sCoins=0, sReward=0;
  for (let d=1; d<=( MONTH_DAYS[month]||30); d++) {
    const c = md.days[d]||0; if (!c) continue;
    const isF = d<=15;
    const r = calcDay(c, isF, md); if (!r) continue;
    coins+=c; jpy+=r.jpy; reward+=r.reward; studio+=r.studio;
    if (isF) { fCoins+=c; fReward+=r.reward; } else { sCoins+=c; sReward+=r.reward; }
    if (md.extra[d]) {
      streams+=parseInt(md.extra[d].streams)||0;
      // favTotal = cumulative fav count; diff from previous recorded day
      const favTotal = parseInt(md.extra[d].favTotal)||0;
      if (favTotal > 0) {
        // find previous day's favTotal in this month
        let prevTotal = 0;
        for (let pd=d-1; pd>=1; pd--) {
          if (md.extra[pd] && parseInt(md.extra[pd].favTotal)>0) { prevTotal=parseInt(md.extra[pd].favTotal); break; }
        }
        favs += Math.max(0, favTotal - prevTotal);
      }
    }
  }
  return {coins, jpy, reward, studio, streams, favs, fCoins, fReward, sCoins, sReward};
}

function fmt(n, t='n') {
  if (n===null||n===undefined||isNaN(n)) return '—';
  if (t==='jpy') return '¥'+Math.round(n).toLocaleString();
  if (t==='usd') return '$'+n.toFixed(2);
  if (t==='pct') return (n*100).toFixed(0)+'%';
  return Math.round(n).toLocaleString();
}

function toast(msg, c='var(--green)') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.color=c;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function saveFlash() {
  const f=document.getElementById('save-flash');
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 800);
}

// ─ 共通 ─
function rebuildCastSelects() {
  ['oi-cast','rep-filter-cast'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    const was=el.value;
    if (id==='rep-filter-cast') {
      el.innerHTML='<option value="all">全員</option>'+store.casts.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    } else {
      el.innerHTML=store.casts.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    }
    if (was) el.value=was;
  });
  // oi-cast
  const oic=document.getElementById('oi-cast');
  if (oic) { const w=oic.value; oic.innerHTML=store.casts.map(c=>`<option value="${c.id}">${c.name}</option>`).join(''); if(w) oic.value=w; }
  // rep filter
  const rf=document.getElementById('rep-filter');
  if (rf) { const w=rf.value; rf.innerHTML='<option value="all">全キャスト合計</option>'+store.casts.map(c=>`<option value="${c.id}">${c.name}</option>`).join(''); if(w) rf.value=w; }
}

// ═══════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════
function goLogin() {
  try { sessionStorage.removeItem('owner_autologin'); } catch(e) {}
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('cast-name-screen').classList.add('hidden');
  try { document.getElementById('cast-pw-input').value=''; } catch(e) {}
  document.getElementById('owner-pw-screen').classList.add('hidden');
  document.getElementById('cast-app').classList.remove('active');
  document.getElementById('owner-app').classList.remove('active');
}

function showCastName() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('cast-name-screen').classList.remove('hidden');
  document.getElementById('cast-pw-error').textContent = '';
  document.getElementById('cast-pw-error').classList.remove('show');
  document.getElementById('cast-pw-input').value = '';
  setTimeout(()=>document.getElementById('cast-pw-input').focus(), 100);
}

function clearCastPwError() {
  document.getElementById('cast-pw-error').classList.remove('show');
  document.getElementById('cast-pw-error').textContent = '';
}

function directOwnerLogin() {
  document.getElementById('login-screen').classList.add('hidden');
  startOwnerApp();
}

function showOwnerPw() {
  // ロック中チェック
  const remMin = getLockRemainingMin();
  if (remMin > 0) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('owner-pw-screen').classList.remove('hidden');
    const errEl = document.getElementById('pw-error');
    errEl.textContent = `🔒 ${remMin}分間ロックされています`;
    errEl.classList.add('show');
    return;
  }
  // セッション自動ログイン確認
  try {
    if (sessionStorage.getItem('owner_autologin') === '1') {
      document.getElementById('login-screen').classList.add('hidden');
      startOwnerApp();
      return;
    }
  } catch(e) {}
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('owner-pw-screen').classList.remove('hidden');
  setTimeout(()=>document.getElementById('owner-pw-input').focus(), 100);
}

function checkOwnerPw() {
  const errEl = document.getElementById('pw-error');
  // ロック中チェック
  const remMin = getLockRemainingMin();
  if (remMin > 0) {
    errEl.textContent = `🔒 ${remMin}分間ロックされています`;
    errEl.classList.add('show');
    document.getElementById('owner-pw-input').value = '';
    return;
  }
  const pw = document.getElementById('owner-pw-input').value;
  if (pw === ownerPassword) {
    loginFailCount = 0;
    lockUntil = 0;
    errEl.classList.remove('show');
    errEl.textContent = '';
    document.getElementById('owner-pw-input').value = '';
    // 自動ログイン保持
    if (document.getElementById('autologin-check').checked) {
      try { sessionStorage.setItem('owner_autologin', '1'); } catch(e) {}
    }
    document.getElementById('owner-pw-screen').classList.add('hidden');
    startOwnerApp();
  } else {
    loginFailCount++;
    document.getElementById('owner-pw-input').value = '';
    document.getElementById('owner-pw-input').focus();
    const remaining = 5 - loginFailCount;
    if (loginFailCount >= 5) {
      lockUntil = Date.now() + 30 * 60 * 1000; // 30分ロック
      loginFailCount = 0;
      errEl.textContent = '🔒 5回失敗しました。30分間ロックします';
      errEl.classList.add('show');
    } else {
      errEl.textContent = `パスワードが違います（あと${remaining}回失敗でロック）`;
      errEl.classList.add('show');
    }
  }
}

// ═══════════════════════════════════════
// CAST APP
// ═══════════════════════════════════════
let castCurrentId = '';
let castMonth = new Date().getMonth()+1;

function startCastApp() {
  const pw = document.getElementById('cast-pw-input').value;
  const errEl = document.getElementById('cast-pw-error');
  if (!pw) { errEl.textContent = 'パスワードを入力してください'; errEl.classList.add('show'); return; }
  // パスワードが一致するキャストを検索
  const cast = store.casts.find(c => store.castPasswords[c.id] === pw);
  if (!cast) {
    errEl.textContent = 'パスワードが違います';
    errEl.classList.add('show');
    document.getElementById('cast-pw-input').value = '';
    document.getElementById('cast-pw-input').focus();
    return;
  }
  castCurrentId = cast.id;
  errEl.classList.remove('show');
  document.getElementById('cast-pw-input').value = '';
  document.getElementById('cast-name-screen').classList.add('hidden');
  document.getElementById('cast-app').classList.add('active');
  document.getElementById('cast-header-name').textContent = cast.name;
  castRenderMonth();
}

function castChangeMonth(d) {
  castMonth = Math.min(12, Math.max(1, castMonth+d));
  castRenderMonth();
}

function castRenderMonth() {
  document.getElementById('cast-month-label').textContent = `${castMonth}月`;
  document.getElementById('cast-header-month').textContent = `${castMonth}月`;
  castRenderStats();
  castRenderDays();
}

function castRenderStats() {
  const s = calcMonth(castCurrentId, castMonth);
  document.getElementById('cast-mini-stats').innerHTML = `
    <div class="mini-stat">
      <div class="mini-stat-label">コイン（月計）</div>
      <div class="mini-stat-val" style="color:var(--amber)">${s.coins.toLocaleString()}</div>
    </div>
    <div class="mini-stat">
      <div class="mini-stat-label">配信回数（月計）</div>
      <div class="mini-stat-val" style="color:var(--accent2)">${s.streams||0}<span style="font-size:12px;color:var(--text3);">回</span></div>
    </div>
    <div class="mini-stat">
      <div class="mini-stat-label">お気に入り増加（月計）</div>

function toggleDayCard(d) {
  const body = document.getElementById(`db-${d}`);
  const cv = document.getElementById(`cv-${d}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  cv.classList.toggle('open');
  if (!isOpen) {
    const first = body.querySelector('input');
    if (first) setTimeout(()=>first.focus(), 50);
  }
}

function castSave(day, field, value) {
  const md = getMonthData(castCurrentId, castMonth);
  if (field === 'coins') {
    const c = parseInt(value)||0;
    if (c>0) md.days[day]=c; else delete md.days[day];
  } else {
    if (!md.extra[day]) md.extra[day]={};
    md.extra[day][field] = value;
  }
  // update card state
  const c = md.days[day]||0;
  const ex = md.extra[day]||{};
  const filled = c>0||ex.streams>0||ex.favTotal>0||ex.memo;
  const card = document.getElementById(`dc-${day}`);
  if (filled) card.classList.add('filled'); else card.classList.remove('filled');
  // update preview
  let chips='';
  if (c>0) chips+=`<span class="preview-chip chip-coin">${c.toLocaleString()}</span>`;
  if (ex.streams>0) chips+=`<span class="preview-chip chip-stream">${ex.streams}回</span>`;
  if (ex.favTotal>0) chips+=`<span class="preview-chip chip-fav">♡${parseInt(ex.favTotal).toLocaleString()}</span>`;
  if (!chips) chips=`<span style="color:var(--text3); font-size:11px;">未入力</span>`;
  card.querySelector('.day-preview').innerHTML = chips;
  castRenderStats();
  saveFlash();
  // GASに非同期保存
  const ex2 = md.extra[day]||{};
  gasPost('saveExtra', {
    castId: castCurrentId,
    month: castMonth,
    day,
    streams: parseInt(ex2.streams)||0,
    favTotal: parseInt(ex2.favTotal)||0,
    memo: ex2.memo||''
  }).catch(e=>console.error('保存エラー',e));
}

  toast('データを保存しました ✓');
  setTimeout(()=>goLogin(), 1000);
}

async function syncMonthToGAS(castId, month) {
  const md = getMonthData(castId, month);
  const days = Object.keys(md.days);
  for (const d of days) {
    await gasPost('saveRecord', {
      castId, month, day:parseInt(d), coins:md.days[d],
      rewardRate:md.rewardRate, fx1:md.fx1, fx2:md.fx2
    });
  }
  // 為替・報酬率だけ保存（コイン0でも）
  if (days.length === 0) {
    await gasPost('saveRecord', {
      castId, month, day:0, coins:0,
      rewardRate:md.rewardRate, fx1:md.fx1, fx2:md.fx2
    });
  }
}

function saveCastPw(castId) {
  const input = document.getElementById('cpw-'+castId);
  const pw = input.value.trim();
  if (!pw) { toast('パスワードを入力してください', 'var(--rose)'); return; }
  if (pw.length < 4) { toast('4文字以上で設定してください', 'var(--rose)'); return; }
  // 他のキャストと同じPWはNG
  const duplicate = store.casts.find(c => c.id !== castId && store.castPasswords[c.id] === pw);
  if (duplicate) { toast('このパスワードは他のキャストが使用中です', 'var(--rose)'); return; }
  store.castPasswords[castId] = pw;
  gasPost('saveSettings', { settings: { ['castPw_'+castId]: pw } }).catch(e=>console.error(e));
  input.value = '';
  toast('パスワードを設定しました ✓');
  ownerRenderCasts();
}

  for(let m=1;m<=12;m++){
    let c=0,j=0,r=0,s=0;
    targets.forEach(cast=>{const x=calcMonth(cast.id,m);c+=x.coins;j+=x.jpy;r+=x.reward;s+=x.studio;});
    gc+=c;gj+=j;gr+=r;gs+=s;
    rows+=`<tr><td>${m}月</td><td>${c?c.toLocaleString():'—'}</td><td>${j?fmt(j,'jpy'):'—'}</td><td style="color:var(--accent2);">${r?fmt(r,'jpy'):'—'}</td><td style="color:var(--teal);">${s?fmt(s,'jpy'):'—'}</td></tr>`;
  }
  rows+=`<tr class="tr-total"><td>合計</td><td>${gc.toLocaleString()}</td><td>${fmt(gj,'jpy')}</td><td style="color:var(--accent2);">${fmt(gr,'jpy')}</td><td style="color:var(--teal);">${fmt(gs,'jpy')}</td></tr>`;
  document.getElementById('rep-detail').innerHTML=`<table><thead><tr><th style="text-align:left;">月</th><th>コイン</th><th>円売上</th><th style="color:var(--accent2);">キャスト報酬</th><th style="color:var(--teal);">事務所利益</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ─ パスワード変更 ─
function changePassword() {
  const old=document.getElementById('pw-old').value;
  const nw=document.getElementById('pw-new').value;
  const nw2=document.getElementById('pw-new2').value;
  const msg=document.getElementById('pw-change-msg');
  if (old!==ownerPassword){msg.style.color='var(--rose)';msg.textContent='現在のパスワードが違います';return;}
  if (nw.length<6){msg.style.color='var(--rose)';msg.textContent='新パスワードは6文字以上';return;}
  if (nw!==nw2){msg.style.color='var(--rose)';msg.textContent='確認パスワードが一致しません';return;}
  ownerPassword=nw;
  gasPost('saveSettings', {settings:{ownerPassword:nw}}).catch(e=>console.error(e));
  ['pw-old','pw-new','pw-new2'].forEach(id=>document.getElementById(id).value='');
  msg.style.color='var(--green)';msg.textContent='パスワードを変更しました ✓';
  toast('パスワードを変更しました ✓');
}

// ─ CSVエクスポート ─
function exportCSV() {
  let csv='\uFEFF月,キャスト,コイン数,円売上,キャスト報酬,事務所利益,配信回数,お気に入り増加\n';
  for(let m=1;m<=12;m++){
    store.casts.forEach(cast=>{
      const s=calcMonth(cast.id,m);
      if(s.coins>0) csv+=`${m}月,${cast.name},${s.coins},${Math.round(s.jpy)},${Math.round(s.reward)},${Math.round(s.studio)},${s.streams},${s.favs}\n`;
    });
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`studio_report_2026.csv`; a.click();
  toast('CSVを出力しました ✓');
}
